version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/agents/worker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/agents/boss"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/agents/watchdog"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/agents/worker"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/agents/boss"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/agents/watchdog"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
